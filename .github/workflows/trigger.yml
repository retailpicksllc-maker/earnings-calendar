name: 1-Minute Trigger

on:
  schedule:
    - cron: '* * * * *'   # GitHub runs this ~every 5 min, but combined with self-loop below
  workflow_dispatch:
  workflow_run:
    workflows: ["1-Minute Trigger"]
    types: [completed]     # re-trigger itself on completion = continuous loop

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Wait 60 seconds
        run: sleep 60

      - name: Trigger main build
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build.yml',
              ref: 'main'
            });
            console.log('Build triggered at', new Date().toISOString());
